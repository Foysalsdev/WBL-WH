<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold gradient (Whirlpool #eeb111) -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0C040"/>
      <stop offset="1" stop-color="#D89E0A"/>
    </linearGradient>
    <!-- Glossy highlight -->
    <radialGradient id="gloss" cx="0.5" cy="0.25" r="0.55">
      <stop stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom shadow -->
    <radialGradient id="shadow" cx="0.5" cy="0.85" r="0.4">
      <stop stop-color="#000" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <!-- W text gradient -->
    <linearGradient id="wGrad" x1="0" y1="0" x2="0" y2="512">
      <stop stop-color="#1a2540"/>
      <stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="100" fill="#C89105"/>
  <rect x="32" y="32" width="448" height="448" rx="88" fill="url(#goldGrad)"/>

  <!-- Glossy highlight (top half) -->
  <rect x="32" y="32" width="448" height="448" rx="88" fill="url(#gloss)"/>

  <!-- Bottom shadow -->
  <rect x="32" y="32" width="448" height="448" rx="88" fill="url(#shadow)"/>

  <!-- W monogram (Whirlpool) -->
  <text x="256" y="350" font-family="'DejaVu Sans','Liberation Sans',Arial,sans-serif"
        font-size="300" font-weight="bold" fill="url(#wGrad)" text-anchor="middle">W</text>

  <!-- Glossy reflection on top of W -->
  <rect x="32" y="32" width="448" height="224" rx="88" fill="#fff" opacity="0.08"/>
</svg>
